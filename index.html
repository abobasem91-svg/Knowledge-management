<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مركز نهج العملي — منصة المعرفة والمشاريع</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: #f5f5f0;
    color: #1a1a18;
    min-height: 100vh;
    overflow-x: hidden;
  }

  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f0;
    --bg-tertiary: #eeede8;
    --text-primary: #1a1a18;
    --text-secondary: #73726c;
    --border: rgba(0,0,0,0.1);
    --border-hover: rgba(0,0,0,0.2);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1c;
      --bg-secondary: #2a2a28;
      --bg-tertiary: #141412;
      --text-primary: #e8e6de;
      --text-secondary: #9c9a92;
      --border: rgba(255,255,255,0.1);
      --border-hover: rgba(255,255,255,0.2);
    }
    body { background: #141412; color: #e8e6de; }
  }

  /* ===== PAGE SYSTEM ===== */
  .page { display: none; min-height: 100vh; }
  .page.active { display: block; }

  /* ===== LANDING PAGE ===== */
  #page-landing {
    background: linear-gradient(135deg, #0d2d4a 0%, #1a4a7a 50%, #0f3560 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
    padding: 40px 20px;
  }

  #page-landing::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 40%, rgba(200,146,42,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 70%, rgba(255,255,255,0.03) 0%, transparent 50%);
    pointer-events: none;
  }

  .landing-header { text-align: center; margin-bottom: 56px; position: relative; }

  .landing-logo {
    width: 80px; height: 80px;
    background: rgba(200,146,42,0.15);
    border: 2px solid rgba(200,146,42,0.4);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px; font-size: 36px;
  }

  .landing-header h1 { font-size: 36px; font-weight: 900; color: #ffffff; margin-bottom: 8px; }
  .landing-header .subtitle { font-size: 15px; color: rgba(255,255,255,0.55); }

  .landing-cards { display: flex; gap: 24px; position: relative; z-index: 1; flex-wrap: wrap; justify-content: center; }

  .landing-card {
    width: 260px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px; padding: 36px 28px;
    cursor: pointer; transition: all 0.3s ease;
    text-align: center; position: relative; overflow: hidden;
  }

  .landing-card::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    border-radius: 20px 20px 0 0;
  }

  .landing-card.blue::before { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
  .landing-card.gold::before { background: linear-gradient(90deg, #c8922a, #f0b843); }

  .landing-card:hover { transform: translateY(-6px); background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.22); }

  .card-icon { font-size: 48px; margin-bottom: 16px; display: block; }
  .landing-card h2 { font-size: 20px; font-weight: 700; color: #ffffff; margin-bottom: 10px; }
  .landing-card p { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.7; }

  .card-arrow {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7);
    font-size: 18px; margin-top: 20px; transition: all 0.3s;
  }
  .landing-card:hover .card-arrow { background: rgba(255,255,255,0.2); color: #ffffff; }

  /* ===== LOGIN PAGE ===== */
  #page-login { background: var(--bg-secondary); display: flex; flex-direction: column; min-height: 100vh; }

  .login-topbar {
    background: var(--bg-primary);
    border-bottom: 0.5px solid var(--border);
    padding: 16px 32px;
    display: flex; align-items: center; gap: 12px;
  }

  .back-btn {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text-secondary);
    cursor: pointer; padding: 6px 12px;
    border-radius: 8px; border: 0.5px solid var(--border);
    background: transparent; transition: all 0.2s;
    font-family: 'Cairo', sans-serif;
  }
  .back-btn:hover { background: var(--bg-secondary); color: var(--text-primary); }

  .login-section-title { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-right: 8px; }

  .login-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }

  .login-box {
    background: var(--bg-primary);
    border: 0.5px solid var(--border);
    border-radius: 20px; padding: 40px;
    width: 100%; max-width: 440px;
  }

  .login-box h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; color: var(--text-primary); }
  .login-box .login-sub { font-size: 13px; color: var(--text-secondary); margin-bottom: 32px; }

  .users-grid { display: flex; flex-direction: column; gap: 10px; }

  .user-card {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px;
    border: 0.5px solid var(--border);
    border-radius: 12px; cursor: pointer; transition: all 0.2s;
    background: transparent; width: 100%; text-align: right;
    font-family: 'Cairo', sans-serif;
  }
  .user-card:hover { background: var(--bg-secondary); border-color: var(--border-hover); }

  .user-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; flex-shrink: 0;
  }
  .avatar-km { background: #e8f0fb; color: #1a4a7a; }
  .avatar-pm { background: #fef3e2; color: #c8922a; }

  .user-info { flex: 1; }
  .user-name { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
  .user-role { font-size: 12px; color: var(--text-secondary); }

  .user-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .badge-km { background: #e8f0fb; color: #1a4a7a; }
  .badge-pm { background: #fef3e2; color: #c8922a; }

  /* ===== APP SHELL ===== */
  #page-app { display: flex; flex-direction: column; min-height: 100vh; background: var(--bg-secondary); }

  .app-topbar {
    background: #0d2d4a; color: #fff;
    padding: 0 24px; height: 56px;
    display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 100; flex-shrink: 0;
  }

  .app-logo-text { font-size: 16px; font-weight: 700; color: #fff; }
  .app-logo-sub { font-size: 11px; color: rgba(255,255,255,0.5); }
  .topbar-divider { width: 1px; height: 28px; background: rgba(255,255,255,0.15); margin: 0 4px; }

  .topbar-nav { display: flex; gap: 4px; flex: 1; flex-wrap: wrap; }

  .topbar-nav-btn {
    padding: 6px 14px; border-radius: 8px;
    font-size: 13px; font-weight: 500;
    color: rgba(255,255,255,0.65);
    cursor: pointer; border: none; background: transparent;
    font-family: 'Cairo', sans-serif; transition: all 0.2s;
    white-space: nowrap;
  }
  .topbar-nav-btn.active, .topbar-nav-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

  .topbar-user { display: flex; align-items: center; gap: 8px; font-size: 13px; color: rgba(255,255,255,0.8); }

  .topbar-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(200,146,42,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #f0b843; cursor: pointer;
  }

  .logout-btn {
    padding: 5px 12px; border-radius: 7px; font-size: 12px;
    color: rgba(255,255,255,0.5); cursor: pointer;
    border: 0.5px solid rgba(255,255,255,0.15); background: transparent;
    font-family: 'Cairo', sans-serif; transition: all 0.2s;
  }
  .logout-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

  .app-content { flex: 1; overflow: auto; }

  .view { display: none; padding: 24px; }
  .view.active { display: block; }

  .section-header { margin-bottom: 20px; }
  .section-title { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
  .section-sub { font-size: 13px; color: var(--text-secondary); }

  /* STAT CARDS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 14px; margin-bottom: 24px;
  }

  .stat-card {
    background: var(--bg-primary);
    border: 0.5px solid var(--border);
    border-radius: 14px; padding: 16px 18px;
    position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute;
    top: 0; right: 0; width: 3px; height: 100%;
    border-radius: 0 14px 14px 0;
  }
  .stat-card.blue::before { background: #3b82f6; }
  .stat-card.gold::before { background: #c8922a; }
  .stat-card.green::before { background: #16a34a; }
  .stat-card.red::before { background: #dc2626; }
  .stat-card.purple::before { background: #7c3aed; }

  .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 500; }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--text-primary); line-height: 1; margin-bottom: 4px; }
  .stat-sub { font-size: 11px; color: var(--text-secondary); }

  /* TABLE */
  .table-container {
    background: var(--bg-primary);
    border: 0.5px solid var(--border);
    border-radius: 14px; overflow: hidden; margin-bottom: 24px;
  }

  .table-header {
    padding: 16px 20px;
    border-bottom: 0.5px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
  }

  .table-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .table-controls { display: flex; gap: 8px; flex-wrap: wrap; }

  .filter-select, .search-input {
    padding: 5px 10px;
    border: 0.5px solid var(--border);
    border-radius: 8px; font-size: 12px;
    background: var(--bg-secondary);
    color: var(--text-primary);
    font-family: 'Cairo', sans-serif;
    cursor: pointer; outline: none;
  }
  .search-input { width: 160px; }

  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }

  .data-table th {
    background: var(--bg-secondary);
    padding: 10px 14px; text-align: right;
    font-weight: 600; font-size: 12px;
    color: var(--text-secondary);
    border-bottom: 0.5px solid var(--border);
    white-space: nowrap; cursor: pointer; user-select: none;
  }
  .data-table th:hover { color: var(--text-primary); }

  .data-table td {
    padding: 11px 14px;
    border-bottom: 0.5px solid var(--border);
    color: var(--text-primary); vertical-align: middle;
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--bg-secondary); }

  /* STATUS BADGES */
  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .s-active { background: #e8f5ee; color: #15803d; }
  .s-active .status-dot { background: #16a34a; }
  .s-completed { background: #e8f0fb; color: #1a4a7a; }
  .s-completed .status-dot { background: #2563eb; }
  .s-delayed { background: #fef2f2; color: #dc2626; }
  .s-delayed .status-dot { background: #dc2626; }
  .s-pending { background: #fef9e7; color: #92400e; }
  .s-pending .status-dot { background: #d97706; }
  .s-suspended { background: #f5f3ff; color: #6d28d9; }
  .s-suspended .status-dot { background: #7c3aed; }

  /* PROGRESS */
  .progress-bar {
    height: 6px; background: var(--bg-secondary);
    border-radius: 3px; overflow: hidden; width: 90px;
  }
  .progress-fill { height: 100%; border-radius: 3px; background: #2563eb; }

  /* SPEED */
  .speed-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 24px; }

  .speed-card {
    background: var(--bg-primary);
    border: 0.5px solid var(--border);
    border-radius: 14px; padding: 16px 18px;
  }

  .speed-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .speed-proj-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .speed-value { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .speed-label { font-size: 11px; color: var(--text-secondary); }

  .speed-meter { position: relative; height: 8px; background: var(--bg-secondary); border-radius: 4px; margin-top: 10px; }
  .speed-fill { height: 100%; border-radius: 4px; }
  .speed-fast { background: #16a34a; }
  .speed-med { background: #d97706; }
  .speed-slow { background: #dc2626; }

  /* KM CARDS */
  .km-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-bottom: 24px; }

  .km-card {
    background: var(--bg-primary);
    border: 0.5px solid var(--border);
    border-radius: 14px; padding: 18px;
    cursor: pointer; transition: all 0.2s;
  }
  .km-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }

  .km-card-type {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600;
    padding: 3px 10px; border-radius: 20px; margin-bottom: 10px;
  }
  .type-report { background: #e8f0fb; color: #1a4a7a; }
  .type-guide { background: #e8f5ee; color: #15803d; }
  .type-template { background: #fef3e2; color: #92400e; }
  .type-research { background: #f5f3ff; color: #6d28d9; }
  .type-tool { background: #fef2f2; color: #dc2626; }
  .type-training { background: #f0fdfa; color: #0f766e; }

  .km-card-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; line-height: 1.4; }
  .km-card-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 12px; }
  .km-card-footer { display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--text-secondary); }

  /* CHARTS */
  .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }

  .chart-box {
    background: var(--bg-primary);
    border: 0.5px solid var(--border);
    border-radius: 14px; padding: 18px;
  }
  .chart-box-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px; }

  .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 120px; }
  .bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
  .bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 4px; transition: all 0.4s; cursor: pointer; }
  .bar:hover { filter: brightness(1.15); }
  .bar-label { font-size: 10px; color: var(--text-secondary); text-align: center; }
  .bar-val { font-size: 11px; font-weight: 600; color: var(--text-primary); }

  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-secondary); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* TOOLS */
  .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }

  .tool-card {
    background: var(--bg-primary);
    border: 0.5px solid var(--border);
    border-radius: 12px; padding: 16px;
    text-align: center; cursor: pointer; transition: all 0.2s;
  }
  .tool-card:hover { border-color: var(--border-hover); background: var(--bg-secondary); }
  .tool-icon { font-size: 28px; margin-bottom: 8px; }
  .tool-name { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
  .tool-desc { font-size: 11px; color: var(--text-secondary); }

  /* ALERTS */
  .alert-card {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 16px; border-radius: 10px; margin-bottom: 8px; font-size: 13px;
  }
  .alert-warning { background: #fef9e7; color: #92400e; border: 0.5px solid #fde68a; }
  .alert-info { background: #e8f0fb; color: #1a4a7a; border: 0.5px solid #bfdbfe; }
  .alert-success { background: #e8f5ee; color: #15803d; border: 0.5px solid #bbf7d0; }

  /* TIMELINE */
  .timeline { position: relative; padding-right: 24px; }
  .timeline::before {
    content: ''; position: absolute;
    right: 8px; top: 0; bottom: 0;
    width: 1px; background: var(--border);
  }
  .timeline-item { position: relative; padding-bottom: 16px; }
  .timeline-item::before {
    content: ''; position: absolute;
    right: -20px; top: 4px;
    width: 8px; height: 8px; border-radius: 50%;
    background: #2563eb;
    border: 2px solid var(--bg-primary);
  }
  .timeline-date { font-size: 11px; color: var(--text-secondary); margin-bottom: 2px; }
  .timeline-text { font-size: 13px; color: var(--text-primary); }

  /* FORM */
  .upload-form {
    background: var(--bg-primary);
    border: 0.5px solid var(--border);
    border-radius: 14px; padding: 24px; margin-bottom: 24px;
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }

  .form-input, .form-select, .form-textarea {
    padding: 8px 12px;
    border: 0.5px solid var(--border);
    border-radius: 9px; font-size: 13px;
    background: var(--bg-secondary); color: var(--text-primary);
    font-family: 'Cairo', sans-serif; outline: none; transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: #2563eb; }
  .form-textarea { resize: vertical; min-height: 80px; }

  .btn-primary {
    padding: 10px 24px; background: #1a4a7a; color: #fff;
    border: none; border-radius: 10px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: 'Cairo', sans-serif; transition: background 0.2s;
  }
  .btn-primary:hover { background: #0d3560; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 640px) {
    .chart-row, .two-col, .form-grid { grid-template-columns: 1fr; }
    .landing-cards { flex-direction: column; }
    .app-topbar { flex-wrap: wrap; height: auto; padding: 10px 16px; gap: 8px; }
    .topbar-nav { gap: 2px; }
    .topbar-nav-btn { padding: 4px 8px; font-size: 11px; }
  }
</style>
</head>
<body>

<!-- PAGE 1: LANDING -->
<div id="page-landing" class="page active">
  <div class="landing-header">
    <div class="landing-logo">🏛️</div>
    <h1>مركز نهج العملي</h1>
    <div class="subtitle">منصة إدارة المعرفة والمشاريع المتكاملة</div>
  </div>
  <div class="landing-cards">
    <div class="landing-card blue" onclick="goToLogin('km')">
      <span class="card-icon">📚</span>
      <h2>إدارة المعرفة</h2>
      <p>مستودع المنتجات المعرفية، التقارير، والأدلة الإرشادية للمركز</p>
      <div class="card-arrow">←</div>
    </div>
    <div class="landing-card gold" onclick="goToLogin('pm')">
      <span class="card-icon">📊</span>
      <h2>إدارة المشاريع</h2>
      <p>متابعة مشاريع 2021–2026 مع لوحة تحكم شاملة وأدوات تحليلية</p>
      <div class="card-arrow">←</div>
    </div>
  </div>
</div>

<!-- PAGE 2: LOGIN -->
<div id="page-login" class="page">
  <div class="login-topbar">
    <button class="back-btn" onclick="goBack()">← رجوع</button>
    <span class="login-section-title" id="login-section-label"></span>
  </div>
  <div class="login-content">
    <div class="login-box">
      <h2>تسجيل الدخول</h2>
      <div class="login-sub">اختر اسمك للدخول إلى المنصة</div>
      <div class="users-grid" id="users-list"></div>
    </div>
  </div>
</div>

<!-- PAGE 3: APP -->
<div id="page-app" class="page">
  <div class="app-topbar">
    <div>
      <div class="app-logo-text">نهج العملي</div>
      <div class="app-logo-sub">منصة المعرفة والمشاريع</div>
    </div>
    <div class="topbar-divider"></div>
    <div class="topbar-nav" id="topbar-nav"></div>
    <div class="topbar-user">

// ===== NAVIGATION =====
function goToLogin(section) {
  currentSection = section;
  document.getElementById('login-section-label').textContent = section === 'km' ? 'إدارة المعرفة' : 'إدارة المشاريع';
  const list = document.getElementById('users-list');
  list.innerHTML = '';
  USERS[section].forEach(u => {
    const div = document.createElement('button');
    div.className = 'user-card';
    div.onclick = () => loginAs(u);
    div.innerHTML = `
      <div class="user-avatar ${section === 'km' ? 'avatar-km' : 'avatar-pm'}">${u.initials}</div>
      <div class="user-info">
        <div class="user-name">${u.name}</div>
        <div class="user-role">${u.role}</div>
      </div>
      <span class="user-badge ${section === 'km' ? 'badge-km' : 'badge-pm'}">${section === 'km' ? 'إدارة المعرفة' : 'إدارة مشاريع'}</span>
    `;
    list.appendChild(div);
  });
  showPage('page-login');
}

function loginAs(user) {
  currentUser = user;
  buildApp();
  showPage('page-app');
}

function logout() { currentUser = null; showPage('page-landing'); }
function goBack() { showPage('page-landing'); }

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => { p.classList.remove('active'); p.style.display = 'none'; });
  const t = document.getElementById(id);
  t.classList.add('active');
  t.style.display = id === 'page-landing' ? 'flex' : 'block';
  if (id === 'page-landing') { t.style.flexDirection = 'column'; t.style.alignItems = 'center'; t.style.justifyContent = 'center'; }
}

function drawDonut() {
  const canvas = document.getElementById('donut-pm');
  if (!canvas) return;
  const my = PROJECTS.filter(p => p.manager === currentUser.name);
  const ctx = canvas.getContext('2d');
  const counts = {
    active: my.filter(p=>p.status==='active').length,
    completed: my.filter(p=>p.status==='completed').length,
    delayed: my.filter(p=>p.status==='delayed').length,
    pending: my.filter(p=>p.status==='pending').length,
    suspended: my.filter(p=>p.status==='suspended').length,
  };
  const colors = ['#16a34a','#2563eb','#dc2626','#d97706','#7c3aed'];
  const vals = Object.values(counts);
  const total = vals.reduce((s,v)=>s+v,0);
  if (!total) return;
  let start = -Math.PI/2;
  const cx=50, cy=50, r=42, inner=28;
  vals.forEach((v,i) => {
    if (!v) return;
    const angle = (v/total)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,start+angle);
    ctx.closePath();
    ctx.fillStyle = colors[i];
    ctx.fill();
    start += angle;
  });
  ctx.beginPath();
  ctx.arc(cx,cy,inner,0,Math.PI*2);
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  ctx.fillStyle = isDark ? '#1e1e1c' : '#ffffff';
  ctx.fill();
}

  const rows = PROJECTS.filter(p => p.manager === currentUser.name && p.year === 2025 && (!status||p.status===status));

function renderSpeedCards() {
  const container = document.getElementById('speed-content');
  if (!container) return;
  const myProjs = PROJECTS.filter(p => p.manager === currentUser.name && p.status === 'active');
  const today = new Date('2026-04-18');
  container.innerHTML = `
    <div class="alert-card alert-info" style="margin-bottom:20px">ℹ️ تُحسب سرعة الإنجاز بقسمة نسبة الإنجاز على عدد الأيام المنقضية × 100</div>
    <div class="speed-grid">
      ${myProjs.map(p=>{
        const days = Math.round((today - new Date(p.start))/(1000*60*60*24));
        const speed = days>0 ? (p.progress/days*100).toFixed(2) : 0;
        const sn = parseFloat(speed);
        const cls = sn>=0.5?'speed-fast':sn>=0.2?'speed-med':'speed-slow';
        const lbl = sn>=0.5?'🟢 سريع':sn>=0.2?'🟡 متوسط':'🔴 بطيء';
        const pct = Math.min(100,sn*200);
        return `<div class="speed-card">
          <div class="speed-card-header"><div class="speed-proj-name">${p.name.substring(0,28)}…</div><span class="status-badge s-active"><span class="status-dot"></span>نشط</span></div>
          <div class="speed-value" style="color:${sn>=0.5?'#16a34a':sn>=0.2?'#d97706':'#dc2626'}">${speed}</div>
          <div class="speed-label">نقطة إنجاز / 100 يوم — ${lbl}</div>
          <div style="font-size:11px;color:var(--text-secondary);margin-top:4px">${days} يوم منذ البداية — الإنجاز: ${p.progress}%</div>
          <div class="speed-meter"><div class="speed-fill ${cls}" style="width:${pct}%"></div></div>
        </div>`;
      }).join('')}
    </div>`;
}

function filterProjects() {
  const search = (document.getElementById('proj-search')?.value||'').toLowerCase();
  const partner = document.getElementById('filt-partner')?.value||'';
  const region  = document.getElementById('filt-region')?.value||'';
  const manager = document.getElementById('filt-manager')?.value||'';
  const track   = document.getElementById('filt-track')?.value||'';
  const status  = document.getElementById('filt-status')?.value||'';
  currentProjects = PROJECTS.filter(p=>
    (!search||p.name.includes(search)||p.partner.includes(search))&&
    (!partner||p.partner===partner)&&(!region||p.region===region)&&
    (!manager||p.manager===manager)&&(!track||p.track===track)&&
    (!status||p.status===status));
  renderProjectsTable(currentProjects);
}

function sortTable(field) {
  if (sortField===field) sortAsc=!sortAsc; else { sortField=field; sortAsc=true; }
  currentProjects.sort((a,b)=>sortAsc?(a[field]>b[field]?1:-1):(a[field]<b[field]?1:-1));
  renderProjectsTable(currentProjects);
}

function filterKM() {
  const search = (document.getElementById('km-search')?.value||'').toLowerCase();
  const type   = document.getElementById('km-type-filter')?.value||'';
  const filtered = KM_PRODUCTS.filter(p=>(!search||p.title.includes(search)||p.desc.includes(search))&&(!type||p.type===type));
  const typeMap = { 'دليل':'type-guide','تقرير':'type-report','نموذج':'type-template','بحث':'type-research','أداة':'type-tool','تدريب':'type-training' };
  const grid = document.getElementById('km-grid');
  if (grid) grid.innerHTML = filtered.map(p=>`<div class="km-card"><span class="km-card-type ${typeMap[p.type]||'type-report'}">${p.type}</span><div class="km-card-title">${p.title}</div><div class="km-card-desc">${p.desc}</div><div class="km-card-footer"><span>📅 ${p.date}</span><span>⬇️ ${p.downloads}</span></div></div>`).join('');
}
